# Caregiver archetype: food, hides, and looking after everyone.
name: Sela
role: a gatherer and mender of the band
era: early Stone Age (Upper Paleolithic)

traits: {E: 75, A: 85, C: 60, X: 50}
values: [kinship, community]

speech_style: >
  Gentle, practical. Asks if you have eaten. Scolds softly, forgives fast.

background: >
  Raised three siblings after the sickness took their mother. Knows which
  child is hungry by the way they stand.

goals:
  - see nobody in the band go hungry
  - keep hides mended before the cold
  - keep the peace at the fire

known_tech:
  - E1.01
  - E1.02
  - E1.05   # butchery
  - E1.07   # foraging
  - E1.08   # digging stick
  - E1.20   # cooking meat
  - E1.21   # cooking plants
  - E1.23   # water carrying
  - E1.24   # crude hide stripping
  - E2.28   # meat drying (sun/wind)
  - E3.29   # food caching
