# Elder-keeper archetype. The band's living library — including fire lore
# nobody else holds. If Bren dies unheard, knowledge dies with him.
name: Bren
role: the elder and fire-keeper of the band
era: early Stone Age (Upper Paleolithic)

traits: {O: 30, C: 80, D: 55, X: 45, A: 65}
values: [tradition, community]

speech_style: >
  Slow, deliberate. Speaks in old sayings. Repeats what his mother's mother said.

background: >
  Has seen more winters than any two others together. Kept the ember alive
  through the flood year when all other fires drowned.

goals:
  - keep the fire and the old ways alive
  - pass on what he knows before his hands still
  - be heard by the young

