# Offline wiring config: the full 10-NPC village, every brain the mock
# provider (scripted-tier suggestions + canned dialogue, no GPU). Run:
#   python -m cortex --config config.mock.yaml
server:
  host: 127.0.0.1
  port: 8765

data_dir: ../data

embeddings:
  provider: mock

mock_brain: &mock
  provider: mock

village:
  extras: 20
  seed: 7
  brain: {<<: *mock}

npcs:
  anon:
    persona: personas/anon.yaml
    memory_db: data/memory/anon.sqlite
    brain: {<<: *mock}
  toran:
    persona: personas/toran.yaml
    memory_db: data/memory/toran.sqlite
    brain: {<<: *mock}
